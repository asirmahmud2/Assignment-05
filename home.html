<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title -->
    <title>GitHub Issues Tracker</title>

    <!-- font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
        integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration  -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');


        * {
            font-family: "Geist", sans-serif;
        }
    </style>

    <!-- tailwind+daisyui  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex flex-col sm:flex-row justify-between items-center w-11/12 mx-auto gap-4 py-3 sm:py-0">
                <div class="flex items-center">
                    <img src="assets/Github icon.png" alt="">
                    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                </div>

                <div class="flex gap-2">
                    <input id="search-input" type="text" placeholder="Search"
                        class="input input-bordered w-24 md:w-auto" />

                    <button id="search-btn" class="btn btn-primary font-bold text-white">Search</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- Buttons -->
        <section
            class="bg-white border border-gray-100 rounded-xl shadow-md w-11/12 lg:w-10/12 mx-auto p-4 md:p-10 mt-8 md:mt-15 mb-5 flex flex-wrap gap-3 justify-center sm:justify-start">
            <button onclick="switchTab('all-card-container','all-btn')" id="all-btn"
                class="btn btn-primary font-bold w-[90px]">All</button>
            <button onclick="switchTab('open-container','open-btn')" id="open-btn"
                class="btn font-bold w-[90px]">Open</button>
            <button onclick="switchTab('close-container','close-btn')" id="close-btn"
                class="btn font-bold w-[90px]">Closed</button>
        </section>

        <!-- Issues Info and cards -->
        <section
            class="bg-white border border-gray-100 rounded-xl shadow-md w-11/12 lg:w-10/12 mx-auto p-4 md:p-10 mt-8 md:mt-15">

            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center w-full mb-5 gap-4">
                <div class="flex items-center gap-3">
                    <img src="assets/Aperture.png" alt="">
                    <div>
                        <h2 class="text-xl font-bold"><span id="issue-no">50</span> issues</h2>
                        <p class="text-gray-400">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 bg-green-500 rounded-full"></div>
                        <p>Open</p>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 bg-purple-500 rounded-full"></div>
                        <p>Closed</p>
                    </div>
                </div>

            </div>

            <div id="spinner" class="flex justify-center items-center py-10 bg-gray-200 hidden">
                <span class="loading loading-bars loading-xl"></span>
            </div>

            <div id="all-space" class="bg-gray-200 w-full">
                <div id="all-card-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 p-4 md:p-10">

                </div>
            </div>

            <div id="open-space" class="bg-gray-200 w-full">
                <div id="open-container"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 p-4 md:p-10 hidden">

                </div>
            </div>

            <div id="close-space" class="bg-gray-200 w-full">
                <div id="close-container"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 p-4 md:p-10 hidden">

                </div>
            </div>

            <div id="search-space" class="bg-gray-200 w-full">
                <div id="search-container"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 p-4 md:p-10 hidden">

                </div>
            </div>

        </section>


        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="details-container">

                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>
    <script src="scripts/functionality.js"></script>
</body>

</html>
